        h1 {

        }
        h3 {
            text-align: center; /* центрируем заголовок */
            font-family: Arial;
        }

        p {
            max-width: 800px;     /* максимальная ширина текста */
            margin: 0 auto;       /* центрируем текстовый блок */
            padding: 0 15px;      /* небольшой внутренний отступ, чтобы текст не прилипал к краям */
            line-height: 1.5;     /* улучшает читаемость */
        }
        img {
            display: block;
            margin: 20px auto;   /* выравниваем изображение по центру */
            max-width: 100%;     /* не позволит изображению выйти за пределы экрана */
            height: auto;
	    
        }
        body{
font-family: Arial;
        }
